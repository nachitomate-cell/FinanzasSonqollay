<!DOCTYPE html>
<html lang="es-CL">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Finanzas Sonqollay</title>
  <meta name="description" content="Contabilidad general de la consultora Sonqollay" />
  <meta name="theme-color" content="#F77000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Finanzas" />
  <script>(function(){try{var t=localStorage.getItem('finanzas_theme');if(t==='dark'||(!t&&window.matchMedia&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon-192.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <img src="icon-192.png" alt="Sonqollay" class="brand-logo" />
      <div class="brand-text">
        <strong>Finanzas</strong>
        <span>Sonqollay</span>
      </div>
    </div>
    <nav class="nav">
      <button class="nav-item active" data-view="dashboard"><svg class="ic" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 7V5a2 2 0 0 0-2-2H5a2 2 0 0 0 0 4h14a2 2 0 0 1 2 2v2"/><path d="M3 5v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-4"/><path d="M18 12a2 2 0 0 0 0 4h3v-4z"/></svg> Resumen</button>
      <button class="nav-item" data-view="movimientos"><svg class="ic" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3 4 7l4 4"/><path d="M4 7h16"/><path d="m16 21 4-4-4-4"/><path d="M20 17H4"/></svg> Movimientos</button>
      <button class="nav-item" data-view="flujo"><svg class="ic" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><rect x="7" y="10" width="3" height="7" rx="1"/><rect x="12" y="6" width="3" height="11" rx="1"/><rect x="17" y="13" width="3" height="4" rx="1"/></svg> Flujo de caja</button>
      <button class="nav-item" data-view="categorias"><svg class="ic" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg> Por categoría</button>
    </nav>
    <div class="sidebar-foot">
      <div class="sync-state" id="syncState" title="Estado de datos">
        <span class="dot"></span><span id="syncLabel">Modo local</span>
      </div>
      <button class="btn-ghost sm" id="installBtn" hidden>Instalar app</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <header class="topbar">
      <img src="icon-192.png" alt="Sonqollay" class="topbar-logo only-mobile" />
      <div class="period">
        <button class="icon-btn" id="prevMonth" aria-label="Mes anterior"><svg class="ic" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></button>
        <h1 id="periodLabel">—</h1>
        <button class="icon-btn" id="nextMonth" aria-label="Mes siguiente"><svg class="ic" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></button>
        <button class="btn-ghost sm" id="todayBtn">Hoy</button>
      </div>
      <div class="topbar-actions">
        <span class="sync-chip only-mobile" id="syncChip"><span class="dot"></span>Local</span>
        <button class="icon-btn" id="cfgBtn" title="Ajustes" aria-label="Ajustes"><svg class="ic" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
        <button class="icon-btn" id="bellBtn" title="Activar recordatorios" aria-label="Recordatorios"><svg class="ic" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg></button>
        <div class="menu-wrap">
          <button class="btn-ghost sm" id="exportBtn" title="Exportar"><svg class="ic" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg> Exportar</button>
          <div class="menu" id="exportMenu" hidden>
            <button type="button" data-exp="csv">CSV</button>
            <button type="button" data-exp="xlsx">Excel (.xlsx)</button>
            <button type="button" data-exp="pdf">PDF (reporte)</button>
          </div>
        </div>
        <button class="btn-primary" id="newBtn">+ Movimiento</button>
      </div>
    </header>

    <div class="content" id="content"><!-- vistas inyectadas por app.js --></div>
  </main>

  <!-- Navegación inferior (móvil) -->
  <nav class="bottom-nav" id="bottomNav">
    <button class="bn-item active" data-view="dashboard"><svg class="ic" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 7V5a2 2 0 0 0-2-2H5a2 2 0 0 0 0 4h14a2 2 0 0 1 2 2v2"/><path d="M3 5v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-4"/><path d="M18 12a2 2 0 0 0 0 4h3v-4z"/></svg>Resumen</button>
    <button class="bn-item" data-view="movimientos"><svg class="ic" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3 4 7l4 4"/><path d="M4 7h16"/><path d="m16 21 4-4-4-4"/><path d="M20 17H4"/></svg>Movim.</button>
    <button class="bn-item" data-view="flujo"><svg class="ic" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><rect x="7" y="10" width="3" height="7" rx="1"/><rect x="12" y="6" width="3" height="11" rx="1"/><rect x="17" y="13" width="3" height="4" rx="1"/></svg>Flujo</button>
    <button class="bn-item" data-view="categorias"><svg class="ic" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>Categ.</button>
  </nav>

  <!-- Botón flotante (móvil) -->
  <button class="fab" id="fab" aria-label="Nuevo movimiento"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg></button>

  <!-- Modal movimiento -->
  <div class="modal-backdrop" id="modal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <h2 id="modalTitle">Nuevo movimiento</h2>
        <button class="icon-btn" id="modalClose" aria-label="Cerrar">✕</button>
      </div>
      <form id="movForm" class="modal-body">
        <input type="hidden" id="f_id" />
        <div class="seg">
          <label class="seg-opt income">
            <input type="radio" name="tipo" value="ingreso" checked /> <span>Ingreso</span>
          </label>
          <label class="seg-opt expense">
            <input type="radio" name="tipo" value="egreso" /> <span>Egreso</span>
          </label>
        </div>
        <div class="grid2">
          <label class="field">Fecha
            <input type="date" id="f_fecha" required />
          </label>
          <label class="field">Moneda
            <select id="f_moneda">
              <option value="CLP">CLP — peso</option>
              <option value="USD">USD — dólar</option>
              <option value="UF">UF</option>
            </select>
          </label>
        </div>
        <label class="field">Monto <span class="muted-inline" id="montoCur">(CLP)</span>
          <input type="number" id="f_monto" min="0" step="any" inputmode="decimal" placeholder="0" required />
        </label>
        <div class="conv-hint" id="convHint" hidden></div>
        <label class="field">Categoría
          <select id="f_categoria" required></select>
        </label>
        <label class="field">Descripción
          <input type="text" id="f_descripcion" maxlength="120" placeholder="Ej. Cotización adjudicada Arcadis" />
        </label>
        <div class="grid2">
          <label class="field">Contraparte
            <input type="text" id="f_contraparte" maxlength="80" placeholder="Cliente / proveedor" />
          </label>
          <label class="field">Documento
            <input type="text" id="f_documento" maxlength="40" placeholder="Factura / boleta N°" />
          </label>
        </div>
        <div class="grid2">
          <label class="field">Medio de pago
            <select id="f_medio">
              <option>Transferencia</option>
              <option>Efectivo</option>
              <option>Tarjeta</option>
              <option>Cheque</option>
              <option>Otro</option>
            </select>
          </label>
          <label class="field">Estado
            <select id="f_estado">
              <option value="pagado">Pagado / Cobrado</option>
              <option value="pendiente">Pendiente</option>
            </select>
          </label>
        </div>
        <label class="field">Cuenta
          <select id="f_cuenta"></select>
        </label>
        <label class="check">
          <input type="checkbox" id="f_iva" /> Afecto a IVA (19%)
        </label>
        <label class="field" id="venceField" hidden>Vence (fecha de cobro / pago)
          <input type="date" id="f_vence" />
        </label>
        <div class="field">Comprobante (boleta / factura)
          <input type="file" id="f_file" accept="image/*" capture="environment" hidden />
          <div class="attach">
            <button type="button" class="btn-ghost" id="attachBtn">📷 Adjuntar o tomar foto</button>
            <div class="attach-preview" id="attachPreview" hidden>
              <img id="attachImg" alt="Comprobante" />
              <button type="button" class="icon-btn attach-remove" id="attachRemove" title="Quitar foto">✕</button>
            </div>
          </div>
        </div>
        <div class="modal-foot">
          <button type="button" class="btn-ghost danger" id="deleteBtn" hidden>Eliminar</button>
          <span class="spacer"></span>
          <button type="button" class="btn-ghost" id="cancelBtn">Cancelar</button>
          <button type="submit" class="btn-primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal categorías -->
  <div class="modal-backdrop" id="catModal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="catTitle">
      <div class="modal-head">
        <h2 id="catTitle">Categorías</h2>
        <button class="icon-btn" id="catClose" aria-label="Cerrar">✕</button>
      </div>
      <div class="modal-body" id="catBody"><!-- inyectado por app.js --></div>
    </div>
  </div>

  <!-- Registro rápido (2 toques) -->
  <div class="modal-backdrop" id="quickModal" hidden>
    <div class="modal quick" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h2>Registro rápido</h2>
        <button class="icon-btn" id="quickClose" aria-label="Cerrar">✕</button>
      </div>
      <div class="modal-body">
        <div class="seg">
          <label class="seg-opt expense"><input type="radio" name="qtipo" value="egreso" checked /> <span>Gasto</span></label>
          <label class="seg-opt income"><input type="radio" name="qtipo" value="ingreso" /> <span>Ingreso</span></label>
        </div>
        <div class="q-amount" id="qAmount">$0</div>
        <div class="q-chips" id="qChips"></div>
        <div class="keypad" id="keypad">
          <button type="button" data-k="1">1</button><button type="button" data-k="2">2</button><button type="button" data-k="3">3</button>
          <button type="button" data-k="4">4</button><button type="button" data-k="5">5</button><button type="button" data-k="6">6</button>
          <button type="button" data-k="7">7</button><button type="button" data-k="8">8</button><button type="button" data-k="9">9</button>
          <button type="button" data-k="000">000</button><button type="button" data-k="0">0</button><button type="button" data-k="back">⌫</button>
        </div>
        <div class="modal-foot">
          <button type="button" class="btn-ghost" id="quickMore">Más opciones</button>
          <span class="spacer"></span>
          <button type="button" class="btn-primary" id="quickSave">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Ajustes -->
  <div class="modal-backdrop" id="cfgModal" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h2>Ajustes</h2>
        <button class="icon-btn" id="cfgClose" aria-label="Cerrar">✕</button>
      </div>
      <div class="modal-body" id="cfgBody"><!-- inyectado por app.js --></div>
    </div>
  </div>

  <!-- Movimientos recurrentes -->
  <div class="modal-backdrop" id="recModal" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h2>Recurrentes</h2>
        <button class="icon-btn" id="recClose" aria-label="Cerrar">✕</button>
      </div>
      <div class="modal-body" id="recBody"><!-- inyectado por app.js --></div>
    </div>
  </div>

  <!-- Cuentas / billeteras -->
  <div class="modal-backdrop" id="ctaModal" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h2>Cuentas</h2>
        <button class="icon-btn" id="ctaClose" aria-label="Cerrar">✕</button>
      </div>
      <div class="modal-body" id="ctaBody"><!-- inyectado por app.js --></div>
    </div>
  </div>

  <!-- Pantalla de bloqueo (PIN / huella) -->
  <div class="lock" id="lockScreen" hidden>
    <img src="icon-192.png" class="lock-logo" alt="Finanzas Sonqollay" />
    <div class="lock-title" id="lockTitle">Ingresá tu PIN</div>
    <div class="pin-dots" id="pinDots"><i></i><i></i><i></i><i></i></div>
    <div class="keypad lock-pad" id="lockPad"></div>
    <button class="btn-ghost lock-bio" id="bioBtn" hidden>🔓 Usar huella / Face ID</button>
  </div>

  <!-- Visor de comprobante -->
  <div class="img-viewer" id="imgViewer" hidden>
    <button class="icon-btn img-close" id="imgClose" aria-label="Cerrar">✕</button>
    <img id="imgFull" alt="Comprobante" />
  </div>

  <div class="toast" id="toast" hidden></div>

  <script type="module" src="app.js"></script>
</body>
</html>
